name: MedMart Dev Sprint report

# Twice daily at 8:00 AM and 6:00 PM US Eastern, year-round (DST-proof).
# Four UTC crons cover both EDT and EST. We pick the slot from the cron
# expression that fired (github.event.schedule) plus the current TZ — NOT
# the wall-clock hour — so GitHub Actions cron delays (often 1–4 hours on
# the free tier) don't cause us to silently skip a send.
on:
  schedule:
    - cron: '0 12 * * *'   # 08:00 EDT
    - cron: '0 13 * * *'   # 08:00 EST
    - cron: '0 22 * * *'   # 18:00 EDT
    - cron: '0 23 * * *'   # 18:00 EST
  workflow_dispatch:
    inputs:
      slot:
        description: 'Force a run (am or pm)'
        required: false
        default: 'am'

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Determine slot
        id: slot
        run: |
          MANUAL='${{ github.event.inputs.slot }}'
          if [ -n "$MANUAL" ]; then
            echo "slot=$MANUAL" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          TZ_ABBR=$(TZ=America/New_York date +%Z)
          SCHEDULE='${{ github.event.schedule }}'
          slot=
          if [ "$TZ_ABBR" = "EDT" ]; then
            case "$SCHEDULE" in
              "0 12 * * *") slot=am ;;
              "0 22 * * *") slot=pm ;;
            esac
          elif [ "$TZ_ABBR" = "EST" ]; then
            case "$SCHEDULE" in
              "0 13 * * *") slot=am ;;
              "0 23 * * *") slot=pm ;;
            esac
          fi
          if [ -z "$slot" ]; then
            echo "TZ=$TZ_ABBR schedule='$SCHEDULE' is not the matching send slot — skipping."
          else
            echo "TZ=$TZ_ABBR schedule='$SCHEDULE' -> slot=$slot"
          fi
          echo "slot=$slot" >> "$GITHUB_OUTPUT"
      - name: Fire report
        if: steps.slot.outputs.slot != ''
        run: |
          code=$(curl -sS -o /tmp/resp.json -w '%{http_code}' \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://ryanpatt.com/api/sprint-report?slot=${{ steps.slot.outputs.slot }}")
          echo "HTTP $code"; cat /tmp/resp.json
          [ "$code" = "200" ] || exit 1
